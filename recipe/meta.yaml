{% set name = "litellm" %}
{% set version = "1.86.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/litellm-{{ version }}.tar.gz
  sha256: 7d559ad48b97d796ff325af88fd7eebbdc66e58773fb5312130ab1cac968f8f3

build:
  entry_points:
    - litellm = litellm:run_server
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build ==0.11.8
    - pip
  run:
    - fastuuid >=0.14.0,<1.0
    - httpx >=0.28.0,<1.0
    - python >={{ python_min }}
    - openai >=2.20.0,<3.0.0
    - python-dotenv >=1.0.0,<2.0
    - tiktoken >=0.8.0,<1.0
    - importlib-metadata >=8.0.0,<9.0
    - tokenizers >=0.21.0,<1.0
    - click >=8.0.0,<9.0
    - jinja2 >=3.1.6,<4.0
    - aiohttp >=3.10,<4.0
    - pydantic >=2.10.0,<3.0.0
    - jsonschema >=4.0.0,<5.0
  run_constrained:
    - uvicorn ==0.33.0
    - uvloop ==0.21.0
    - gunicorn ==23.0.0
    - fastapi ==0.124.4
    - backoff ==2.2.1
    - pyyaml ==6.0.3
    - rq ==2.7.0
    - orjson ==3.11.6
    - apscheduler ==3.11.2
    - pyjwt ==2.12.0
    - python-multipart ==0.0.27
    - cryptography ==46.0.7
    - azure-identity ==1.25.2
    - azure-keyvault-secrets ==4.10.0
    - azure-storage-blob ==12.28.0
    - google-cloud-kms ==2.24.2
    - google-cloud-iam ==2.19.1
    - google-cloud-aiplatform ==1.133.0
    - pynacl ==1.6.2
    - websockets ==15.0.1
    - boto3 ==1.43.1
    - mcp ==1.26.0
    - a2a-sdk ==0.3.24
    - rich ==13.9.4
    - diskcache ==5.6.3
    - polars ==1.38.1
    - semantic-router ==0.1.12
    - aurelio-sdk ==0.0.19
    - mlflow ==3.11.1
    - soundfile ==0.12.1
    - pyroscope-io ==0.8.16
    - grpcio ==1.78.0
    - restrictedpython ==8.1
    # not yet available on conda-forge
    - prisma ==0.11.0
    - resend ==2.23.0
    - fastapi-sso ==0.19.0
    - redisvl ==0.4.1
    - litellm-proxy-extras ==0.4.72
    - litellm-enterprise ==0.1.40

test:
  imports:
    - litellm
  commands:
    - pip check
    - litellm --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Library to easily interface with LLM API providers
  home: https://github.com/BerriAI/litellm
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - m-rossi
    - jan-janssen
