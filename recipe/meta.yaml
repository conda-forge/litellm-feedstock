{% set name = "litellm" %}
{% set version = "1.83.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/litellm-{{ version }}.tar.gz
  sha256: 803b53077cd678bb78d40f1a971920a8cd06073520c756e3d2bcb5c4da7bd352

build:
  entry_points:
    - litellm = litellm:run_server
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build
    - pip
  run:
    - fastuuid ==0.14.0
    - httpx ==0.28.1
    - python >={{ python_min }}
    - openai ==2.24.0
    - python-dotenv ==1.0.1
    - tiktoken ==0.12.0
    - importlib-metadata ==8.5.0
    - tokenizers ==0.22.2
    - click ==8.1.8
    - jinja2 ==3.1.6
    - aiohttp ==3.13.3
    - pydantic ==2.12.5
    - jsonschema ==4.23.0
  run_constrained:
    - uvicorn 0.33.0
    - uvloop 0.21.0
    - gunicorn 23.0.0
    - fastapi 0.124.4
    - backoff 2.2.1
    - pyyaml 6.0.3
    - rq 2.7.0
    - orjson 3.11.5
    - apscheduler 3.11.2
    - pyjwt 2.11.0
    - python-multipart 0.0.26
    - cryptography 46.0.7
    - azure-identity 1.25.2
    - azure-keyvault-secrets 4.10.0
    - azure-storage-blob 12.28.0
    - google-cloud-kms 2.24.2
    - google-cloud-iam 2.19.1
    - google-cloud-aiplatform 1.133.0
    - pynacl 1.6.2
    - websockets 15.0.1
    - boto3 1.42.59
    - mcp 1.26.0
    - a2a-sdk 0.3.24
    - rich 13.9.4
    - diskcache 5.6.3
    - polars 1.38.1
    - semantic-router 0.1.12
    - mlflow 3.9.0
    - soundfile 0.12.1
    - pyroscope-io 0.8.16
    - grpcio 1.78.0
    - restrictedpython 8.1
    # not yet available on conda-forge
    - prisma 0.11.0
    - resend 2.23.0
    - fastapi-sso 0.19.0
    - redisvl 0.4.1
    - litellm-proxy-extras 0.4.67
    - litellm-enterprise 0.1.38

test:
  imports:
    - litellm
  commands:
    - pip check
    - litellm --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Library to easily interface with LLM API providers
  home: https://github.com/BerriAI/litellm
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - m-rossi
    - jan-janssen
