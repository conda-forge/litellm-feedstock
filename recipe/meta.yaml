{% set name = "litellm" %}
{% set version = "1.92.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/litellm-{{ version }}.tar.gz
  sha256: 773adf5503ee1793289689c899394a83df8122993760d9acd782e32aa798db9d

build:
  entry_points:
    - litellm = litellm:run_server
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - {{ compiler("rust") }}
  host:
    - python
    - puccinialin
    - maturin ==1.9.4
    - pip
  run:
    - fastuuid >=0.14.0,<1.0
    - httpx >=0.28.0,<1.0
    - python
    - openai >=2.20.0,<3.0.0
    - python-dotenv >=1.0.0,<2.0
    - tiktoken >=0.8.0,<1.0
    - importlib-metadata >=8.0.0,<9.0
    - tokenizers >=0.21.0,<1.0
    - click >=8.0.0,<9.0
    - jinja2 >=3.1.6,<4.0
    - aiohttp >=3.10,<4.0
    - pydantic >=2.10.0,<3.0.0
    - jsonschema >=4.0.0,<5.0
  run_constrained:
    # proxy
    - gunicorn >=23.0.0,<24.0
    - uvicorn >=0.33.0,<1.0
    - granian >=2.7.4,<3.0
    - uvloop >=0.21.0,<1.0
    - fastapi >=0.136.3,<1.0
    - starlette >=1.0.1,<2.0
    - backoff >=2.2.1,<3.0
    - pyyaml >=6.0.3,<7.0
    - rq >=2.7.0,<3.0
    - orjson >=3.11.6,<4.0
    - apscheduler >=3.11.2,<4.0
    - fastapi-sso >=0.19.0,<1.0
    - pyjwt >=2.13.0,<3.0
    - python-multipart >=0.0.27,<1.0
    - cryptography >=48.0.1,<49.0
    - pynacl >=1.6.2,<2.0
    - websockets >=15.0.1,<16.0
    - boto3 >=1.43.1,<2.0
    - azure-identity >=1.25.2,<2.0
    - azure-storage-blob >=12.28.0,<13.0
    - mcp >=1.26.0,<2.0
    - litellm-proxy-extras ==0.4.75
    - litellm-enterprise ==0.1.47
    - restrictedpython >=8.1,<9.0
    - rich >=13.9.4,<14.0
    - polars >=1.38.1,<2.0
    - soundfile >=0.12.1,<1.0
    - pyroscope-io >=0.8.16,<1.0
    - pydantic-settings >=2.14.1,<3.0
    - expression >=5.6.0,<6.0
    # cli
    - rich >=13.9.4,<14.0
    - pyyaml >=6.0.3,<7.0
    - requests >=2.32.0,<3.0
    # extra_proxy
    - prisma >=0.11.0,<1.0
    - azure-identity >=1.25.2,<2.0
    - azure-keyvault-secrets >=4.10.0,<5.0
    - google-cloud-kms >=2.24.2,<3.0
    - google-cloud-iam >=2.19.1,<3.0
    - resend >=2.23.0,<3.0
    - redisvl >=0.4.1,<1.0
    - a2a-sdk >=1.1.0,<2.0
    # utils
    - numpydoc >=1.8.0,<2.0
    # caching
    - diskcache >=5.6.3,<6.0
    # semantic-router
    - semantic-router >=0.1.15,<1.0
    - aurelio-sdk >=0.0.19,<1.0
    # mlflow
    - mlflow >=3.11.1,<4.0
    # grpc
    - grpcio ==1.78.0
    # stt-nvidia-riva
    - nvidia-riva-client >=2.15.0
    - soundfile >=0.12.1
    - audioread >=3.0.1
    - numpy >=1.26.0
    # google
    - google-cloud-aiplatform >=1.133.0,<2.0
    # proxy-runtime
    - google-cloud-aiplatform >=1.133.0,<2.0
    - google-genai >=1.37.0,<2.0
    - anthropic >=0.84.0,<1.0
    - grpcio ==1.78.0
    - prometheus-client >=0.20.0,<1.0
    - langfuse >=2.59.7,<3.0
    - opentelemetry-api ==1.28.0
    - opentelemetry-sdk ==1.28.0
    - opentelemetry-exporter-otlp ==1.28.0
    - opentelemetry-instrumentation-fastapi ==0.49b0
    - ddtrace >=2.19.0,<3.0
    - sentry-sdk >=2.21.0,<3.0
    - mangum >=0.17.0,<1.0
    - azure-ai-contentsafety >=1.0.0,<2.0
    - azure-storage-file-datalake >=12.20.0,<13.0
    - pypdf >=6.12.0,<7.0
    - llm-sandbox >=0.3.39,<1.0
    - detect-secrets >=1.5.0,<2.0

test:
  imports:
    - litellm
  commands:
    - pip check
    - litellm --help
  requires:
    - pip

about:
  summary: Library to easily interface with LLM API providers
  home: https://github.com/BerriAI/litellm
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - m-rossi
    - jan-janssen
